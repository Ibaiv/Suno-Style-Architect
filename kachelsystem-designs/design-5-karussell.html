<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karussell — Tool-System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-root: #0d0d0f;
            --glass-bg: rgba(23, 23, 23, 0.4);
            --glass-border: rgba(115, 115, 115, 0.2);
            --glass-blur: 16px;
            --elevated-bg: rgba(13, 13, 15, 0.95);
            --elevated-border: rgba(115, 115, 115, 0.4);
            --elevated-blur: 24px;
            --text-primary: #ffffff;
            --text-body: #e5e7eb;
            --text-secondary: #9ca3af;
            --text-disabled: #6b7280;
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --accent-green: #22c55e;
            --radius-container: 24px;
            --radius-card: 12px;
            --radius-button: 8px;
            --ease-major: cubic-bezier(0.23, 1, 0.32, 1);
            --ease-ui: cubic-bezier(0.4, 0, 0.2, 1);
            --dur-hover: 200ms;
            --dur-slide: 400ms;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-root);
            color: var(--text-body);
        }

        /* ─── Ambient page fill (top 67vh placeholder) ─── */
        .page-fill {
            height: 67vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 0.5rem;
            user-select: none;
        }
        .page-fill h2 {
            font-size: clamp(1.25rem, 2.5vw, 1.75rem);
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        .page-fill p {
            font-size: 0.85rem;
            color: var(--text-disabled);
        }

        /* ─── Carousel Wrapper ─── */
        .carousel-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 33vh;
            min-height: 260px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-bottom: none;
            border-radius: var(--radius-container) var(--radius-container) 0 0;
            overflow: hidden;
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        /* subtle top-edge glow */
        .carousel-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 10%;
            right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(6, 182, 212, 0.35), transparent);
            z-index: 1;
        }

        /* ─── Slide Track ─── */
        .slide-track {
            flex: 1;
            display: flex;
            width: 300%;
            transition: transform var(--dur-slide) var(--ease-major);
            will-change: transform;
            min-height: 0;
        }
        .slide-track.dragging {
            transition: none;
        }

        .slide {
            width: calc(100% / 3);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 1rem 3.25rem 0.25rem;
            position: relative;
            overflow: hidden;
        }

        /* ─── Slide Header ─── */
        .slide-header {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            margin-bottom: 0.625rem;
            flex-shrink: 0;
        }
        .slide-header .accent-bar {
            width: 3px;
            height: 1.25rem;
            border-radius: 2px;
        }
        .slide-header h3 {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }
        .slide-header .tool-count {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-disabled);
            margin-left: 0.25rem;
        }

        /* ─── Tool Grid ─── */
        .tool-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 0.25rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(115,115,115,0.25) transparent;
        }
        .tool-grid::-webkit-scrollbar {
            width: 4px;
        }
        .tool-grid::-webkit-scrollbar-track {
            background: transparent;
        }
        .tool-grid::-webkit-scrollbar-thumb {
            background: rgba(115,115,115,0.25);
            border-radius: 2px;
        }

        /* ─── Tool Card ─── */
        .tool-card {
            background: rgba(23, 23, 23, 0.35);
            border: 1px solid rgba(115, 115, 115, 0.12);
            border-radius: var(--radius-card);
            padding: 0.6rem 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            cursor: pointer;
            transition:
                transform var(--dur-hover) var(--ease-ui),
                background var(--dur-hover) var(--ease-ui),
                border-color var(--dur-hover) var(--ease-ui),
                box-shadow var(--dur-hover) var(--ease-ui);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .tool-card:hover {
            background: rgba(30, 30, 32, 0.6);
            border-color: rgba(115, 115, 115, 0.3);
            transform: scale(1.025);
        }
        .tool-card:active {
            transform: scale(0.98);
        }

        /* per-slide accent hover glows */
        .slide[data-accent="purple"] .tool-card:hover {
            box-shadow: 0 0 18px -4px rgba(168, 85, 247, 0.2);
        }
        .slide[data-accent="cyan"] .tool-card:hover {
            box-shadow: 0 0 18px -4px rgba(6, 182, 212, 0.2);
        }
        .slide[data-accent="green"] .tool-card:hover {
            box-shadow: 0 0 18px -4px rgba(34, 197, 94, 0.2);
        }

        .tool-card .emoji {
            font-size: 1.25rem;
            line-height: 1;
            flex-shrink: 0;
            width: 1.5rem;
            text-align: center;
        }
        .tool-card .label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-body);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ─── Navigation Arrows ─── */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--elevated-bg);
            backdrop-filter: blur(var(--elevated-blur));
            -webkit-backdrop-filter: blur(var(--elevated-blur));
            border: 1px solid var(--elevated-border);
            color: var(--text-primary);
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition:
                opacity var(--dur-hover) var(--ease-ui),
                transform var(--dur-hover) var(--ease-ui),
                background var(--dur-hover) var(--ease-ui);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            outline: none;
        }
        .nav-arrow:hover {
            background: rgba(30, 30, 32, 0.95);
            transform: translateY(-50%) scale(1.1);
        }
        .nav-arrow:active {
            transform: translateY(-50%) scale(0.95);
        }
        .nav-arrow.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .nav-arrow.left { left: 10px; }
        .nav-arrow.right { right: 10px; }

        /* ─── Pagination Dots ─── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 0.4rem 0 0.6rem;
            flex-shrink: 0;
        }
        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--text-disabled);
            transition:
                background var(--dur-slide) var(--ease-major),
                transform var(--dur-slide) var(--ease-major),
                box-shadow var(--dur-slide) var(--ease-major);
            cursor: pointer;
        }
        .dot.active {
            background: var(--accent-cyan);
            transform: scale(1.35);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
        }

        /* ─── Detail Overlay ─── */
        .detail-overlay {
            position: absolute;
            inset: 0;
            z-index: 30;
            background: var(--elevated-bg);
            backdrop-filter: blur(var(--elevated-blur));
            -webkit-backdrop-filter: blur(var(--elevated-blur));
            border-radius: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 1.5rem 2rem;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.96);
            transition:
                opacity 250ms var(--ease-ui),
                transform 250ms var(--ease-major);
        }
        .detail-overlay.visible {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }
        .detail-overlay .detail-emoji {
            font-size: 2.75rem;
            line-height: 1;
        }
        .detail-overlay .detail-name {
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        .detail-overlay .detail-desc {
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-align: center;
            max-width: 42ch;
            line-height: 1.45;
        }
        .detail-overlay .detail-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }
        .detail-overlay .btn {
            padding: 0.45rem 1.1rem;
            border-radius: var(--radius-button);
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition:
                transform var(--dur-hover) var(--ease-ui),
                background var(--dur-hover) var(--ease-ui);
            user-select: none;
        }
        .detail-overlay .btn:active { transform: scale(0.96); }
        .detail-overlay .btn-primary {
            background: var(--accent-cyan);
            color: #0d0d0f;
        }
        .detail-overlay .btn-primary:hover { background: #08c8e8; }
        .detail-overlay .btn-ghost {
            background: rgba(115, 115, 115, 0.15);
            color: var(--text-secondary);
            border: 1px solid rgba(115, 115, 115, 0.2);
        }
        .detail-overlay .btn-ghost:hover {
            background: rgba(115, 115, 115, 0.25);
            color: var(--text-body);
        }

        /* accent-colored detail name per slide */
        .slide[data-accent="purple"] .detail-overlay .detail-name { color: var(--accent-purple); }
        .slide[data-accent="cyan"] .detail-overlay .detail-name { color: var(--accent-cyan); }
        .slide[data-accent="green"] .detail-overlay .detail-name { color: var(--accent-green); }

        /* ─── Responsive tweaks ─── */
        @media (max-width: 768px) {
            .slide { padding: 0.75rem 2.75rem 0.2rem; }
            .tool-grid { grid-template-columns: repeat(2, 1fr); gap: 0.4rem; }
            .tool-card { padding: 0.5rem 0.6rem; gap: 0.5rem; }
            .tool-card .label { font-size: 0.72rem; }
            .nav-arrow { width: 30px; height: 30px; font-size: 0.95rem; }
            .nav-arrow.left { left: 6px; }
            .nav-arrow.right { right: 6px; }
        }

        @media (max-width: 480px) {
            .tool-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- Upper area placeholder -->
<div class="page-fill">
    <h2>Klang Studio</h2>
    <p>Tool-Karussell unten &darr;</p>
</div>

<!-- ─── Carousel ─── -->
<div class="carousel-wrapper" id="carousel">

    <!-- Left Arrow -->
    <button class="nav-arrow left hidden" id="arrowLeft" aria-label="Vorherige Kategorie">&lsaquo;</button>
    <!-- Right Arrow -->
    <button class="nav-arrow right" id="arrowRight" aria-label="Nächste Kategorie">&rsaquo;</button>

    <!-- Slide Track -->
    <div class="slide-track" id="slideTrack">

        <!-- ═══ SLIDE 1 — Experten-Tools ═══ -->
        <div class="slide" data-accent="purple">
            <div class="slide-header">
                <div class="accent-bar" style="background: var(--accent-purple);"></div>
                <h3>Experten-Tools</h3>
                <span class="tool-count">9</span>
            </div>
            <div class="tool-grid" id="grid-0"></div>
            <div class="detail-overlay" id="detail-0"></div>
        </div>

        <!-- ═══ SLIDE 2 — Klug-Tools ═══ -->
        <div class="slide" data-accent="cyan">
            <div class="slide-header">
                <div class="accent-bar" style="background: var(--accent-cyan);"></div>
                <h3>Klug-Tools</h3>
                <span class="tool-count">13</span>
            </div>
            <div class="tool-grid" id="grid-1"></div>
            <div class="detail-overlay" id="detail-1"></div>
        </div>

        <!-- ═══ SLIDE 3 — Futures Lab ═══ -->
        <div class="slide" data-accent="green">
            <div class="slide-header">
                <div class="accent-bar" style="background: var(--accent-green);"></div>
                <h3>Futures Lab</h3>
                <span class="tool-count">7</span>
            </div>
            <div class="tool-grid" id="grid-2"></div>
            <div class="detail-overlay" id="detail-2"></div>
        </div>

    </div><!-- /slide-track -->

    <!-- Pagination -->
    <div class="pagination" id="pagination">
        <div class="dot active" data-index="0"></div>
        <div class="dot" data-index="1"></div>
        <div class="dot" data-index="2"></div>
    </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   DATA
   ═══════════════════════════════════════════════ */
const SLIDES = [
    {
        tools: [
            { emoji: '🎤', name: 'Produzent', desc: 'Professionelle Produktions-Perspektive auf deinen Prompt' },
            { emoji: '🎹', name: 'Musiker', desc: 'Musikalische Tiefe und Arrangement-Expertise' },
            { emoji: '🎬', name: 'Filmkomponist', desc: 'Cinematic Scoring und emotionale Klanglandschaften' },
            { emoji: '🎧', name: 'DJ/Remixer', desc: 'Club-taugliche Beats und Remix-Techniken' },
            { emoji: '🎨', name: 'Avantgarde', desc: 'Experimentelle und grenzüberschreitende Klangwelten' },
            { emoji: '🔲', name: 'Minimalist', desc: 'Reduktion auf das Wesentliche, klare Strukturen' },
            { emoji: '🎵', name: 'Vocal-Harmony', desc: 'Mehrstimmige Arrangements und Vocal-Texturen' },
            { emoji: '🌍', name: 'Ethno', desc: 'Weltmusik-Einflüsse und kulturelle Klangfarben' },
            { emoji: '🔧', name: 'Sound-Ingenieur', desc: 'Technische Klangoptimierung und Mixing-Expertise' }
        ]
    },
    {
        tools: [
            { emoji: '🎛️', name: 'Synth-Designer Lab', desc: 'Synthesizer-Sounds und Klangdesign-Werkstatt' },
            { emoji: '🧬', name: 'Genre-Mixer', desc: 'Kreative Genre-Kreuzungen und Hybrid-Stile' },
            { emoji: '🪝', name: 'Hook-Generator', desc: 'Eingängige Melodien und Ohrwurm-Formeln' },
            { emoji: '🏗️', name: 'Song-Struktur', desc: 'Professioneller Song-Aufbau und Arrangements' },
            { emoji: '✨', name: 'Vibe-Veredler', desc: 'Atmosphärische Verfeinerung und Stimmungs-Tuning' },
            { emoji: '🧑‍🎤', name: 'Künstler-Kompass', desc: 'Stilistische Orientierung an bekannten Künstlern' },
            { emoji: '⏱️', name: 'Tempo-Finder', desc: 'Optimales BPM und rhythmische Grundlage' },
            { emoji: '🧭', name: 'Mood-Analyzer', desc: 'Stimmungsanalyse und emotionale Feinabstimmung' },
            { emoji: '💎', name: 'Production-Finish', desc: 'Finaler Feinschliff für Produktionsqualität' },
            { emoji: '🗣️', name: 'Vocal-Stylist', desc: 'Gesangsstil und Vocal-Charakter-Design' },
            { emoji: '🥁', name: 'Groove-Meister', desc: 'Rhythmus-Patterns und Groove-Entwicklung' },
            { emoji: '🏋️', name: 'Performance-Coach', desc: 'Live-Performance und Energie-Optimierung' },
            { emoji: '🔗', name: 'Effect-Chain', desc: 'Effektketten und Signal-Processing' }
        ]
    },
    {
        tools: [
            { emoji: '🌊', name: 'Adaptive Flow', desc: 'Dynamische Prompt-Anpassung in Echtzeit' },
            { emoji: '🤖', name: 'AI Collaboration', desc: 'KI-gestützte kreative Zusammenarbeit' },
            { emoji: '📖', name: 'Story Arc Designer', desc: 'Narrative Spannungsbögen für Songs' },
            { emoji: '📚', name: 'Narrative Chapters', desc: 'Kapitelbasierte Song-Erzählungen' },
            { emoji: '🌌', name: 'Immersive Space', desc: 'Räumliche Klanglandschaften und 3D-Audio' },
            { emoji: '🫀', name: 'Human Touch', desc: 'Menschliche Wärme und organische Elemente' },
            { emoji: '📊', name: 'Release Forecast', desc: 'Veröffentlichungs-Timing und Trend-Analyse' }
        ]
    }
];

/* ═══════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════ */
let currentSlide = 0;
const totalSlides = SLIDES.length;
let openDetail = null; // { slideIdx, toolIdx }

/* ═══════════════════════════════════════════════
   DOM REFS
   ═══════════════════════════════════════════════ */
const slideTrack  = document.getElementById('slideTrack');
const arrowLeft   = document.getElementById('arrowLeft');
const arrowRight  = document.getElementById('arrowRight');
const dots        = document.querySelectorAll('.dot');

/* ═══════════════════════════════════════════════
   RENDER TOOL GRIDS
   ═══════════════════════════════════════════════ */
SLIDES.forEach((slide, si) => {
    const grid = document.getElementById(`grid-${si}`);
    slide.tools.forEach((tool, ti) => {
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.innerHTML = `<span class="emoji">${tool.emoji}</span><span class="label">${tool.name}</span>`;
        card.addEventListener('click', (e) => { e.stopPropagation(); openToolDetail(si, ti); });
        card.addEventListener('keydown', (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openToolDetail(si, ti); } });
        grid.appendChild(card);
    });
});

/* ═══════════════════════════════════════════════
   SLIDE NAVIGATION
   ═══════════════════════════════════════════════ */
function goToSlide(idx) {
    if (idx < 0 || idx >= totalSlides) return;
    closeAllDetails();
    currentSlide = idx;
    slideTrack.style.transform = `translateX(-${currentSlide * (100 / totalSlides)}%)`;

    // Arrows
    arrowLeft.classList.toggle('hidden', currentSlide === 0);
    arrowRight.classList.toggle('hidden', currentSlide === totalSlides - 1);

    // Dots
    dots.forEach((d, i) => d.classList.toggle('active', i === currentSlide));
}

arrowLeft.addEventListener('click', () => goToSlide(currentSlide - 1));
arrowRight.addEventListener('click', () => goToSlide(currentSlide + 1));
dots.forEach(d => d.addEventListener('click', () => goToSlide(Number(d.dataset.index))));

/* ═══════════════════════════════════════════════
   DETAIL OVERLAY
   ═══════════════════════════════════════════════ */
function openToolDetail(slideIdx, toolIdx) {
    closeAllDetails();
    const tool = SLIDES[slideIdx].tools[toolIdx];
    const overlay = document.getElementById(`detail-${slideIdx}`);
    overlay.innerHTML = `
        <span class="detail-emoji">${tool.emoji}</span>
        <span class="detail-name">${tool.name}</span>
        <span class="detail-desc">${tool.desc}</span>
        <div class="detail-actions">
            <button class="btn btn-ghost" onclick="closeAllDetails()">Zurück</button>
            <button class="btn btn-primary">Anwenden</button>
        </div>
    `;
    // Force reflow then add class for transition
    void overlay.offsetWidth;
    overlay.classList.add('visible');
    openDetail = { slideIdx, toolIdx };
}

function closeAllDetails() {
    document.querySelectorAll('.detail-overlay').forEach(o => o.classList.remove('visible'));
    openDetail = null;
}

/* ═══════════════════════════════════════════════
   KEYBOARD NAVIGATION
   ═══════════════════════════════════════════════ */
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goToSlide(currentSlide - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); goToSlide(currentSlide + 1); }
    if (e.key === 'Escape')     { closeAllDetails(); }
});

/* ═══════════════════════════════════════════════
   TOUCH / POINTER SWIPE
   ═══════════════════════════════════════════════ */
{
    const carousel = document.getElementById('carousel');
    let pointerDown = false;
    let startX = 0;
    let startY = 0;
    let currentX = 0;
    let dragDelta = 0;
    const THRESHOLD = 50; // px to trigger slide change

    carousel.addEventListener('pointerdown', (e) => {
        // Ignore if clicking a button or link
        if (e.target.closest('.nav-arrow, .btn, .dot')) return;
        pointerDown = true;
        startX = e.clientX;
        startY = e.clientY;
        currentX = e.clientX;
        dragDelta = 0;
        slideTrack.classList.add('dragging');
        carousel.setPointerCapture(e.pointerId);
    });

    carousel.addEventListener('pointermove', (e) => {
        if (!pointerDown) return;
        currentX = e.clientX;
        dragDelta = currentX - startX;

        // Calculate offset percentage
        const trackWidth = carousel.offsetWidth * totalSlides;
        const dragPercent = (dragDelta / trackWidth) * 100;
        const basePercent = -(currentSlide * (100 / totalSlides));
        slideTrack.style.transform = `translateX(${basePercent + dragPercent}%)`;
    });

    function endDrag(e) {
        if (!pointerDown) return;
        pointerDown = false;
        slideTrack.classList.remove('dragging');

        if (Math.abs(dragDelta) > THRESHOLD) {
            if (dragDelta < 0 && currentSlide < totalSlides - 1) {
                goToSlide(currentSlide + 1);
            } else if (dragDelta > 0 && currentSlide > 0) {
                goToSlide(currentSlide - 1);
            } else {
                goToSlide(currentSlide); // snap back
            }
        } else {
            goToSlide(currentSlide); // snap back
        }
        dragDelta = 0;
    }

    carousel.addEventListener('pointerup', endDrag);
    carousel.addEventListener('pointercancel', endDrag);

    // Prevent default touch scrolling inside carousel
    carousel.addEventListener('touchmove', (e) => {
        if (pointerDown) e.preventDefault();
    }, { passive: false });
}

/* ═══════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════ */
goToSlide(0);
</script>
